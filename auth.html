<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>CalderonConnect — Únete</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0A0A0A;color:white;font-family:sans-serif;min-height:100vh}header{padding:20px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}.logo{font-size:22px;font-weight:900}.logo span{color:#FF6B00}main{padding:32px 20px}.tabs{display:flex;background:#181818;border:1px solid #2a2a2a;border-radius:12px;padding:4px;margin-bottom:28px}.tab{flex:1;padding:12px;text-align:center;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;color:#888;border:none;background:transparent;font-family:sans-serif}.tab.active{background:#FF6B00;color:white}.card{background:#181818;border:1px solid #2a2a2a;border-radius:20px;padding:28px}.card-title{font-size:32px;font-weight:900;margin-bottom:4px}.card-sub{color:#888;font-size:14px;margin-bottom:24px}.roles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}.role{border:1px solid #2a2a2a;border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:transparent;color:white;font-family:sans-serif;transition:all 0.2s}.role.selected{border-color:#FF6B00;background:rgba(255,107,0,0.08)}.role-emoji{font-size:28px;margin-bottom:8px;display:block}.role-name{font-size:13px;font-weight:800}.role-desc{font-size:11px;color:#888;margin-top:4px}.fg{margin-bottom:16px}.fg label{display:block;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:8px}.fg input,.fg select{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:14px;color:white;font-family:sans-serif;font-size:15px;outline:none}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn-main{width:100%;background:#FF6B00;color:white;border:none;border-radius:10px;padding:16px;font-family:sans-serif;font-weight:800;font-size:16px;cursor:pointer;margin-top:8px}.divider{text-align:center;color:#888;font-size:13px;margin:16px 0}.btn-google{width:100%;background:transparent;color:white;border:1px solid #2a2a2a;border-radius:10px;padding:14px;font-family:sans-serif;font-weight:700;font-size:15px;cursor:pointer}.terms{font-size:12px;color:#888;text-align:center;margin-top:16px}.terms a{color:#FF6B00}.success{display:none;text-align:center;padding:40px 20px}.success .big{font-size:64px;margin-bottom:16px}.success h2{font-size:36px;font-weight:900;margin-bottom:12px}.success p{color:#888;margin-bottom:28px}.btn-dash{display:inline-block;background:#FF6B00;color:white;padding:14px 36px;border-radius:100px;font-weight:800;font-size:15px;text-decoration:none}</style></head><body><header><div class="logo">Calderon<span>Connect</span></div><a href="index.html" style="color:#888;font-size:14px;font-weight:700;text-decoration:none">← Inicio</a></header><main><div class="tabs"><button class="tab active" onclick="switchTab('reg')">Crear cuenta</button><button class="tab" onclick="switchTab('log')">Iniciar sesión</button></div><div id="regForm"><div class="card"><div class="card-title">Únete gratis</div><div class="card-sub">Crea tu cuenta en 2 minutos</div><div class="roles"><button class="role selected" onclick="selRole(this)"><span class="role-emoji">🔍</span><div class="role-name">Busco servicios</div><div class="role-desc">Necesito contratar</div></button><button class="role" onclick="selRole(this)"><span class="role-emoji">💼</span><div class="role-name">Ofrezco servicios</div><div class="role-desc">Quiero ganar dinero</div></button></div><div class="row2"><div class="fg"><label>Nombre</label><input placeholder="Juan"/></div><div class="fg"><label>Apellido</label><input placeholder="García"/></div></div><div class="fg"><label>Correo electrónico</label><input type="email" placeholder="juan@correo.com"/></div><div class="fg"><label>Teléfono WhatsApp</label><input type="tel" placeholder="+52 55 1234 5678"/></div><div class="fg"><label>Ciudad</label><select><option>Selecciona tu ciudad</option><option>Ciudad de México</option><option>Guadalajara</option><option>Monterrey</option><option>Los Angeles, CA</option><option>Houston, TX</option><option>Otra ciudad</option></select></div><div class="fg"><label>Contraseña</label><input type="password" placeholder="Mínimo 8 caracteres"/></div><button class="btn-main" onclick="doReg()">Crear mi cuenta gratis →</button><div class="divider">o regístrate con</div><button class="btn-google">🌐 Continuar con Google</button><div class="terms">Al registrarte aceptas nuestros <a href="#">Términos</a> y <a href="#">Privacidad</a></div></div></div><div id="logForm" style="display:none"><div class="card"><div class="card-title">Bienvenido</div><div class="card-sub">Inicia sesión en tu cuenta</div><div class="fg"><label>Correo electrónico</label><input type="email" placeholder="tu@correo.com"/></div><div class="fg"><label>Contraseña</label><input type="password" placeholder="Tu contraseña"/></div><div style="text-align:right;margin-bottom:16px"><a href="#" style="color:#FF6B00;font-size:13px;font-weight:700;text-decoration:none">¿Olvidaste tu contraseña?</a></div><button class="btn-main" onclick="doLog()">Iniciar sesión →</button><div class="divider">o inicia con</div><button class="btn-google">🌐 Continuar con Google</button></div></div><div class="success" id="successDiv"><div class="big">🎉</div><h2>¡Cuenta creada!</h2><p>Bienvenido a CalderonConnect</p><a href="mobile.html" class="btn-dash">Ir a mi panel →</a></div></main><script>function switchTab(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(t==='reg'&&i===0)||(t==='log'&&i===1)));document.getElementById('regForm').style.display=t==='reg'?'block':'none';document.getElementById('logForm').style.display=t==='log'?'block':'none';}function selRole(el){document.querySelectorAll('.role').forEach(r=>r.classList.remove('selected'));el.classList.add('selected');}function doReg(){document.getElementById('regForm').style.display='none';document.getElementById('successDiv').style.display='block';}function doLog(){document.getElementById('logForm').style.display='none';document.getElementById('successDiv').style.display='block';}</script></body></html>
